<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南宁拖拉机 - 游戏界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            height: 100vh;
        }

        /* 游戏主区域 */
        .game-main {
            display: flex;
            flex-direction: column;
        }

        .game-header {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .game-header h1 {
            color: #ffd700;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* 玩家座位区域 */
        .players-area {
            flex: 1;
            display: grid;
            grid-template-rows: 1fr 2fr 1fr;
            gap: 15px;
        }

        .player-row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .player-seat {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            min-width: 150px;
            text-align: center;
            position: relative;
            transition: all 0.3s;
        }

        .player-seat.active {
            border: 3px solid #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
            transform: scale(1.05);
        }

        .player-seat .seat-number {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
        }

        .player-seat .name {
            font-weight: bold;
            font-size: 1.1em;
            margin: 10px 0;
        }

        .player-seat .cards-count {
            color: #aaa;
            font-size: 0.9em;
        }

        .player-seat .team-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .team-a { background: #e74c3c; }
        .team-b { background: #3498db; }

        /* 桌面区域 */
        .table-area {
            background: radial-gradient(circle, #2c3e50 0%, #1a252f 100%);
            border-radius: 50%;
            width: 350px;
            height: 350px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .table-center {
            text-align: center;
            z-index: 10;
        }

        .current-trick {
            font-size: 1.5em;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .trump-info {
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
            margin-top: 10px;
        }

        .played-cards {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .played-card {
            position: absolute;
            width: 50px;
            height: 75px;
            background: #f0f0f0;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        /* 手牌区域 */
        .hand-area {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .hand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .hand-title {
            color: #ffd700;
            font-size: 1.2em;
        }

        .hand-controls {
            display: flex;
            gap: 10px;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            min-height: 120px;
        }

        .card {
            width: 70px;
            height: 105px;
            background: linear-gradient(145deg, #f8f8f8, #e8e8e8);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #333;
            position: relative;
            user-select: none;
        }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card.selected {
            border-color: #ffd700;
            transform: translateY(-20px);
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
        }

        .card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .card.red {
            color: #e74c3c;
        }

        .card.black {
            color: #2c3e50;
        }

        .card-value {
            font-size: 1.4em;
            font-weight: bold;
        }

        .card-suit {
            font-size: 1.8em;
        }

        .card-joker {
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            color: white;
        }

        .card-joker .card-value {
            font-size: 1.2em;
        }

        /* 侧边栏 */
        .sidebar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-info {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 15px;
        }

        .game-info h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            color: #aaa;
            font-size: 0.8em;
        }

        .info-value {
            font-weight: bold;
            color: #fff;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #219a52;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .btn.active {
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* 日志区域 */
        .log-area {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 10px;
            flex: 1;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85em;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .log-time {
            color: #888;
            margin-right: 5px;
        }

        .log-info { color: #3498db; }
        .log-success { color: #27ae60; }
        .log-warning { color: #f39c12; }
        .log-error { color: #e74c3c; }
        .log-system { color: #9b59b6; }

        /* 状态栏 */
        .status-bar {
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
        }

        .status-connected { color: #27ae60; }
        .status-disconnected { color: #e74c3c; }
        .status-waiting { color: #f39c12; }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #2c3e50;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal h2 {
            color: #ffd700;
            margin-bottom: 20px;
        }

        .modal input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .modal input::placeholder {
            color: #aaa;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons .btn {
            flex: 1;
        }

        /* 响应式设计 */
        @media (max-width: 1200px) {
            .game-container {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                order: -1;
            }
        }

        @media (max-width: 768px) {
            .card {
                width: 50px;
                height: 75px;
            }
            
            .table-area {
                width: 250px;
                height: 250px;
            }
            
            .player-seat {
                min-width: 100px;
                padding: 10px;
            }
        }

        /* 动画效果 */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 1s infinite;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-main">
            <div class="game-header">
                <h1>🎮 南宁拖拉机</h1>
                <p>4人扑克牌游戏 - 2队对抗</p>
            </div>

            <div class="status-bar" id="statusBar">
                <span class="status-disconnected">❌ 未连接服务器</span>
            </div>

            <div class="players-area">
                <!-- 顶部玩家 -->
                <div class="player-row">
                    <div class="player-seat" id="player-0">
                        <div class="seat-number">0</div>
                        <div class="team-badge team-a">队A</div>
                        <div class="name">等待加入...</div>
                        <div class="cards-count">手牌: 0</div>
                    </div>
                </div>

                <!-- 中间区域 -->
                <div class="player-row" style="align-items: center;">
                    <div class="player-seat" id="player-1">
                        <div class="seat-number">1</div>
                        <div class="team-badge team-b">队B</div>
                        <div class="name">等待加入...</div>
                        <div class="cards-count">手牌: 0</div>
                    </div>

                    <div class="table-area">
                        <div class="table-center">
                            <div class="current-trick" id="currentTrick">等待游戏开始</div>
                            <div class="trump-info" id="trumpInfo">
                                <div>主牌: <span id="trumpSuit">-</span></div>
                                <div>级别: <span id="currentLevel">-</span></div>
                            </div>
                        </div>
                        <div class="played-cards" id="playedCards"></div>
                    </div>

                    <div class="player-seat" id="player-2">
                        <div class="seat-number">2</div>
                        <div class="team-badge team-b">队B</div>
                        <div class="name">等待加入...</div>
                        <div class="cards-count">手牌: 0</div>
                    </div>
                </div>

                <!-- 底部玩家 -->
                <div class="player-row">
                    <div class="player-seat" id="player-3">
                        <div class="seat-number">3</div>
                        <div class="team-badge team-a">队A</div>
                        <div class="name">等待加入...</div>
                        <div class="cards-count">手牌: 0</div>
                    </div>
                </div>
            </div>

            <div class="hand-area">
                <div class="hand-header">
                    <div class="hand-title">我的手牌</div>
                    <div class="hand-controls">
                        <span id="handCount">0 张</span>
                    </div>
                </div>
                <div class="cards-container" id="myHand">
                    <!-- 卡牌将通过JS动态生成 -->
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="game-info">
                <h3>📊 游戏信息</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">游戏ID</span>
                        <span class="info-value" id="gameId">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">当前回合</span>
                        <span class="info-value" id="currentTurn">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">当前级别</span>
                        <span class="info-value" id="currentLevelInfo">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">闲家得分</span>
                        <span class="info-value" id="opponentScore">0</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">游戏状态</span>
                        <span class="info-value" id="gameStatus">等待开始</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">我的座位</span>
                        <span class="info-value" id="mySeat">-</span>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="connectBtn" onclick="connect()">连接服务器</button>
                <button class="btn btn-success" id="loginBtn" onclick="showLoginModal()" disabled>登录</button>
                <button class="btn btn-success" id="createGameBtn" onclick="createGame()" disabled>创建游戏</button>
                <button class="btn btn-success" id="joinGameBtn" onclick="showJoinModal()" disabled>加入游戏</button>
                <button class="btn btn-primary" id="startGameBtn" onclick="startGame()" disabled>开始游戏</button>
                <button class="btn btn-primary" id="playCardBtn" onclick="playSelectedCard()" disabled>出牌</button>
                <button class="btn btn-danger" id="endTurnBtn" onclick="endTurn()" disabled>结束回合</button>
            </div>

            <div class="log-area" id="logArea">
                <div class="log-entry log-system">
                    <span class="log-time">[系统]</span> 欢迎来到南宁拖拉机游戏
                </div>
            </div>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>用户登录</h2>
            <input type="text" id="usernameInput" placeholder="请输入用户名" />
            <input type="password" id="passwordInput" placeholder="请输入密码（可选）" />
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="login()">登录</button>
                <button class="btn btn-danger" onclick="closeModal('loginModal')">取消</button>
            </div>
        </div>
    </div>

    <!-- 加入游戏模态框 -->
    <div class="modal" id="joinModal">
        <div class="modal-content">
            <h2>加入游戏</h2>
            <input type="text" id="gameIdInput" placeholder="请输入游戏ID" />
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="joinGame()">加入</button>
                <button class="btn btn-danger" onclick="closeModal('joinModal')">取消</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentUser = null;
        let currentGameId = null;
        let myHand = [];
        let mySeat = null;
        let selectedCardIndex = null;
        let gameStarted = false;
        let players = {};

        // 连接WebSocket服务器
        function connect() {
            try {
                ws = new WebSocket('ws://localhost:8080');
                
                ws.onopen = function() {
                    updateStatus('connected', '✅ 已连接服务器');
                    addLog('系统', '连接成功', 'success');
                    document.getElementById('loginBtn').disabled = false;
                    document.getElementById('connectBtn').disabled = true;
                };
                
                ws.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                };
                
                ws.onclose = function() {
                    updateStatus('disconnected', '❌ 未连接服务器');
                    addLog('系统', '连接断开', 'error');
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('loginBtn').disabled = true;
                };
                
                ws.onerror = function(error) {
                    addLog('错误', error.message, 'error');
                };
                
            } catch (error) {
                addLog('连接错误', error.message, 'error');
            }
        }

        // 处理服务器消息
        function handleMessage(data) {
            console.log('收到消息:', data);
            
            switch(data.type) {
                case 'welcome':
                    addLog('服务器', data.message, 'info');
                    break;
                    
                case 'loginSuccess':
                    currentUser = data.user;
                    mySeat = data.seat;
                    addLog('登录成功', currentUser.username, 'success');
                    document.getElementById('loginBtn').disabled = true;
                    document.getElementById('createGameBtn').disabled = false;
                    document.getElementById('joinGameBtn').disabled = false;
                    document.getElementById('mySeat').textContent = mySeat !== null ? mySeat : '-';
                    break;
                    
                case 'gameCreated':
                    currentGameId = data.gameId;
                    document.getElementById('gameId').textContent = currentGameId;
                    addLog('游戏创建', currentGameId, 'success');
                    document.getElementById('startGameBtn').disabled = false;
                    break;
                    
                case 'gameJoined':
                    currentGameId = data.gameId;
                    mySeat = data.seat;
                    document.getElementById('gameId').textContent = currentGameId;
                    document.getElementById('mySeat').textContent = mySeat;
                    addLog('加入游戏', '成功加入游戏', 'success');
                    break;
                    
                case 'gameStarted':
                    gameStarted = true;
                    addLog('游戏开始', '游戏正式开始!', 'success');
                    document.getElementById('gameStatus').textContent = '进行中';
                    document.getElementById('startGameBtn').disabled = true;
                    break;
                    
                case 'yourHand':
                    myHand = data.hand;
                    renderHand();
                    document.getElementById('handCount').textContent = myHand.length + ' 张';
                    addLog('手牌更新', myHand.length + ' 张卡牌', 'info');
                    break;
                    
                case 'turnChanged':
                    document.getElementById('currentTurn').textContent = data.playerName;
                    updatePlayerActive(data.playerId);
                    addLog('回合变更', data.playerName + ' 的回合', 'info');
                    break;
                    
                case 'cardPlayed':
                    addLog('出牌', data.playerName + ' 打出了 ' + data.card, 'info');
                    updatePlayerCards(data.playerId, data.cardsLeft);
                    break;
                    
                case 'gameOver':
                    addLog('游戏结束', '获胜者: ' + data.winner, 'success');
                    document.getElementById('gameStatus').textContent = '已结束';
                    break;
                    
                case 'playerJoined':
                    updatePlayerInfo(data.seat, data.playerName, data.team);
                    addLog('玩家加入', data.playerName + ' 加入游戏', 'info');
                    break;
                    
                case 'updateGameState':
                    updateGameState(data.state);
                    break;
                    
                case 'error':
                    addLog('错误', data.message, 'error');
                    break;
                    
                default:
                    addLog('未知消息', '类型: ' + data.type, 'warning');
            }
        }

        // 更新玩家信息
        function updatePlayerInfo(seat, name, team) {
            const playerEl = document.getElementById('player-' + seat);
            if (playerEl) {
                playerEl.querySelector('.name').textContent = name;
                const teamBadge = playerEl.querySelector('.team-badge');
                teamBadge.textContent = team === 0 ? '队A' : '队B';
                teamBadge.className = 'team-badge ' + (team === 0 ? 'team-a' : 'team-b');
            }
            players[seat] = { name, team };
        }

        // 更新玩家手牌数
        function updatePlayerCards(seat, cardsLeft) {
            const playerEl = document.getElementById('player-' + seat);
            if (playerEl) {
                playerEl.querySelector('.cards-count').textContent = '手牌: ' + cardsLeft;
            }
        }

        // 更新玩家活跃状态
        function updatePlayerActive(activeSeat) {
            document.querySelectorAll('.player-seat').forEach(seat => {
                seat.classList.remove('active');
            });
            const activeEl = document.getElementById('player-' + activeSeat);
            if (activeEl) {
                activeEl.classList.add('active');
            }
        }

        // 更新游戏状态
        function updateGameState(state) {
            if (state.trumpSuit) {
                document.getElementById('trumpSuit').textContent = state.trumpSuit;
            }
            if (state.currentLevel) {
                document.getElementById('currentLevel').textContent = state.currentLevel;
                document.getElementById('currentLevelInfo').textContent = state.currentLevel;
            }
            if (state.opponentScore !== undefined) {
                document.getElementById('opponentScore').textContent = state.opponentScore;
            }
            if (state.currentTrick) {
                document.getElementById('currentTrick').textContent = state.currentTrick;
            }
        }

        // 渲染手牌
        function renderHand() {
            const container = document.getElementById('myHand');
            container.innerHTML = '';
            
            myHand.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card slide-in';
                cardEl.dataset.index = index;
                
                // 判断花色和颜色
                const suit = card.suit || '';
                const value = card.value || '';
                
                if (suit === 'joker') {
                    cardEl.classList.add('card-joker');
                    cardEl.innerHTML = `<div class="card-value">${value}</div>`;
                } else {
                    const isRed = suit === '♥' || suit === '♦';
                    cardEl.classList.add(isRed ? 'red' : 'black');
                    cardEl.innerHTML = `
                        <div class="card-value">${value}</div>
                        <div class="card-suit">${suit}</div>
                    `;
                }
                
                cardEl.onclick = () => selectCard(index);
                container.appendChild(cardEl);
            });
        }

        // 选择卡牌
        function selectCard(index) {
            // 移除之前的选择
            document.querySelectorAll('.card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // 选择新卡牌
            selectedCardIndex = index;
            const cardEl = document.querySelector(`[data-index="${index}"]`);
            if (cardEl) {
                cardEl.classList.add('selected');
            }
            
            document.getElementById('playCardBtn').disabled = false;
        }

        // 登录
        function login() {
            const username = document.getElementById('usernameInput').value;
            if (!username) {
                addLog('提示', '请输入用户名', 'warning');
                return;
            }
            
            ws.send(JSON.stringify({
                action: 'login',
                username: username,
                password: document.getElementById('passwordInput').value
            }));
            
            closeModal('loginModal');
        }

        // 创建游戏
        function createGame() {
            ws.send(JSON.stringify({
                action: 'createGame'
            }));
        }

        // 加入游戏
        function joinGame() {
            const gameId = document.getElementById('gameIdInput').value;
            if (!gameId) {
                addLog('提示', '请输入游戏ID', 'warning');
                return;
            }
            
            ws.send(JSON.stringify({
                action: 'joinGame',
                gameId: gameId
            }));
            
            closeModal('joinModal');
        }

        // 开始游戏
        function startGame() {
            if (!currentGameId) {
                addLog('提示', '请先创建或加入游戏', 'warning');
                return;
            }
            
            ws.send(JSON.stringify({
                action: 'startGame',
                gameId: currentGameId
            }));
        }

        // 出牌
        function playSelectedCard() {
            if (selectedCardIndex === null) {
                addLog('提示', '请先选择要出的牌', 'warning');
                return;
            }
            
            if (!currentGameId) {
                addLog('提示', '请先加入游戏', 'warning');
                return;
            }
            
            ws.send(JSON.stringify({
                action: 'playCard',
                gameId: currentGameId,
                cardIndex: selectedCardIndex
            }));
            
            selectedCardIndex = null;
            document.getElementById('playCardBtn').disabled = true;
        }

        // 结束回合
        function endTurn() {
            if (!currentGameId) {
                addLog('提示', '请先加入游戏', 'warning');
                return;
            }
            
            ws.send(JSON.stringify({
                action: 'endTurn',
                gameId: currentGameId
            }));
        }

        // 更新状态栏
        function updateStatus(status, message) {
            const statusBar = document.getElementById('statusBar');
            statusBar.innerHTML = `<span class="status-${status}">${message}</span>`;
        }

        // 添加日志
        function addLog(category, message, type = 'info') {
            const logArea = document.getElementById('logArea');
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry log-${type}`;
            
            const time = new Date().toLocaleTimeString();
            logEntry.innerHTML = `<span class="log-time">[${time}]</span> ${category}: ${message}`;
            
            logArea.appendChild(logEntry);
            logArea.scrollTop = logArea.scrollHeight;
            
            // 限制日志数量
            while (logArea.children.length > 100) {
                logArea.removeChild(logArea.firstChild);
            }
        }

        // 显示模态框
        function showLoginModal() {
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('usernameInput').focus();
        }

        function showJoinModal() {
            document.getElementById('joinModal').style.display = 'flex';
            document.getElementById('gameIdInput').focus();
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal('loginModal');
                closeModal('joinModal');
            }
            if (e.key === 'Enter') {
                if (document.getElementById('loginModal').style.display === 'flex') {
                    login();
                } else if (document.getElementById('joinModal').style.display === 'flex') {
                    joinGame();
                }
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            addLog('系统', '页面加载完成', 'system');
            addLog('提示', '请先连接服务器，然后登录', 'system');
        });
    </script>
</body>
</html>
