<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南宁拖拉机 - 卡牌游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #4a4a6a;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .header p {
            color: #aaa;
            margin-top: 10px;
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            margin-top: 20px;
        }

        .main-game {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            min-height: 500px;
        }

        .players-area {
            display: grid;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .player-seat {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            position: relative;
        }

        .player-seat.active {
            border: 2px solid #ffd700;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }

        .player-seat .name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .player-seat .cards-count {
            color: #aaa;
            font-size: 0.9em;
        }

        .player-seat .team {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
        }

        .team-a { background: #e74c3c; }
        .team-b { background: #3498db; }

        .table-area {
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            width: 300px;
            height: 300px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .table-center {
            text-align: center;
        }

        .current-trick {
            font-size: 1.2em;
            color: #ffd700;
        }

        .hand-area {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .hand-title {
            margin-bottom: 10px;
            color: #ffd700;
        }

        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
        }

        .card {
            width: 60px;
            height: 90px;
            background: linear-gradient(145deg, #f0f0f0, #e0e0e0);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #333;
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .card.selected {
            border-color: #ffd700;
            transform: translateY(-15px);
        }

        .card.red {
            color: #e74c3c;
        }

        .card.black {
            color: #2c3e50;
        }

        .card-value {
            font-size: 1.2em;
            font-weight: bold;
        }

        .card-suit {
            font-size: 1.5em;
        }

        .card-joker {
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            color: white;
        }

        .sidebar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
        }

        .game-info {
            margin-bottom: 20px;
        }

        .game-info h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .controls {
            margin-top: 20px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #219a52;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
        }

        .log-area {
            margin-top: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9em;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 2px 0;
        }

        .log-info { color: #3498db; }
        .log-success { color: #27ae60; }
        .log-warning { color: #f39c12; }
        .log-error { color: #e74c3c; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #2c3e50;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
        }

        .modal h2 {
            color: #ffd700;
            margin-bottom: 20px;
        }

        .modal input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            font-size: 1em;
        }

        .status-bar {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
        }

        .status-connected { color: #27ae60; }
        .status-disconnected { color: #e74c3c; }
        .status-waiting { color: #f39c12; }

        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
            }
            
            .card {
                width: 50px;
                height: 75px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 南宁拖拉机</h1>
            <p>4人扑克牌游戏 - 2队对抗</p>
        </div>

        <div class="status-bar" id="statusBar">
            <span class="status-disconnected">❌ 未连接服务器</span>
        </div>

        <div class="game-area">
            <div class="main-game">
                <div class="players-area">
                    <div class="player-seat" id="player-top">
                        <div class="team team-a">队A</div>
                        <div class="name">等待加入...</div>
                        <div class="cards-count">手牌: 0</div>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <div class="player-seat" id="player-left">
                            <div class="team team-b">队B</div>
                            <div class="name">等待加入...</div>
                            <div class="cards-count">手牌: 0</div>
                        </div>
                        <div class="table-area">
                            <div class="table-center">
                                <div class="current-trick" id="currentTrick">等待游戏开始</div>
                                <div id="trumpSuit">主牌: -</div>
                            </div>
                        </div>
                        <div class="player-seat" id="player-right">
                            <div class="team team-b">队B</div>
                            <div class="name">等待加入...</div>
                            <div class="cards-count">手牌: 0</div>
                        </div>
                    </div>
                    <div class="player-seat" id="player-bottom">
                        <div class="team team-a">队A</div>
                        <div class="name">等待加入...</div>
                        <div class="cards-count">手牌: 0</div>
                    </div>
                </div>

                <div class="hand-area">
                    <div class="hand-title">我的手牌</div>
                    <div class="cards-container" id="myHand">
                        <!-- 卡牌将通过JS动态生成 -->
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="game-info">
                    <h3>游戏信息</h3>
                    <div class="info-item">
                        <span>游戏ID:</span>
                        <span id="gameId">-</span>
                    </div>
                    <div class="info-item">
                        <span>当前回合:</span>
                        <span id="currentTurn">-</span>
                    </div>
                    <div class="info-item">
                        <span>当前级别:</span>
                        <span id="currentLevel">-</span>
                    </div>
                    <div class="info-item">
                        <span>闲家得分:</span>
                        <span id="opponentScore">0</span>
                    </div>
                    <div class="info-item">
                        <span>游戏状态:</span>
                        <span id="gameStatus">等待开始</span>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn btn-primary" id="connectBtn" onclick="connect()">连接服务器</button>
                    <button class="btn btn-success" id="loginBtn" onclick="showLoginModal()" disabled>登录</button>
                    <button class="btn btn-success" id="createGameBtn" onclick="createGame()" disabled>创建游戏</button>
                    <button class="btn btn-success" id="joinGameBtn" onclick="showJoinModal()" disabled>加入游戏</button>
                    <button class="btn btn-primary" id="startGameBtn" onclick="startGame()" disabled>开始游戏</button>
                    <button class="btn btn-primary" id="playCardBtn" onclick="playSelectedCard()" disabled>出牌</button>
                    <button class="btn btn-danger" id="endTurnBtn" onclick="endTurn()" disabled>结束回合</button>
                </div>

                <div class="log-area" id="logArea">
                    <div class="log-entry log-info">系统: 欢迎来到南宁拖拉机游戏</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>用户登录</h2>
            <input type="text" id="usernameInput" placeholder="请输入用户名" />
            <input type="password" id="passwordInput" placeholder="请输入密码（可选）" />
            <button class="btn btn-primary" onclick="login()">登录</button>
            <button class="btn btn-danger" onclick="closeModal('loginModal')">取消</button>
        </div>
    </div>

    <!-- 加入游戏模态框 -->
    <div class="modal" id="joinModal">
        <div class="modal-content">
            <h2>加入游戏</h2>
            <input type="text" id="gameIdInput" placeholder="请输入游戏ID" />
            <button class="btn btn-primary" onclick="joinGame()">加入</button>
            <button class="btn btn-danger" onclick="closeModal('joinModal')">取消</button>
        </div>
    </div>

    <script>
        let ws = null;
        let currentUser = null;
        let currentGameId = null;
        let myHand = [];
        let selectedCardIndex = null;
        let gameStarted = false;

        // 连接WebSocket服务器
        function connect() {
            try {
                ws = new WebSocket('ws://localhost:8080');
                
                ws.onopen = function() {
                    updateStatus('connected', '✅ 已连接服务器');
                    addLog('系统: 连接成功', 'success');
                    document.getElementById('loginBtn').disabled = false;
                    document.getElementById('connectBtn').disabled = true;
                };
                
                ws.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                };
                
                ws.onclose = function() {
                    updateStatus('disconnected', '❌ 未连接服务器');
                    addLog('系统: 连接断开', 'error');
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('loginBtn').disabled = true;
                };
                
                ws.onerror = function(error) {
                    addLog('错误: ' + error, 'error');
                };
                
            } catch (error) {
                addLog('连接错误: ' + error.message, 'error');
            }
        }

        // 处理服务器消息
        function handleMessage(data) {
            console.log('收到消息:', data);
            
            switch(data.type) {
                case 'welcome':
                    addLog('服务器: ' + data.message, 'info');
                    break;
                    
                case 'loginSuccess':
                    currentUser = data.user;
                    addLog('登录成功: ' + currentUser.username, 'success');
                    document.getElementById('loginBtn').disabled = true;
                    document.getElementById('createGameBtn').disabled = false;
                    document.getElementById('joinGameBtn').disabled = false;
                    break;
                    
                case 'gameCreated':
                    currentGameId = data.gameId;
                    document.getElementById('gameId').textContent = currentGameId;
                    addLog('游戏创建成功: ' + currentGameId, 'success');
                    document.getElementById('startGameBtn').disabled = false;
                    break;
                    
                case 'gameJoined':
                    currentGameId = data.gameId;
                    document.getElementById('gameId').textContent = currentGameId;
                    addLog('加入游戏成功', 'success');
                    break;
                    
                case 'gameStarted':
                    gameStarted = true;
                    addLog('游戏开始!', 'success');
                    document.getElementById('gameStatus').textContent = '进行中';
                    document.getElementById('startGameBtn').disabled = true;
                    break;
                    
                case 'yourHand':
                    myHand = data.hand;
                    renderHand();
                    addLog('收到手牌: ' + myHand.length + ' 张', 'info');
                    break;
                    
                case 'turnChanged':
                    document.getElementById('currentTurn').textContent = data.playerName;
                    addLog('回合变更: ' + data.playerName, 'info');
                    break;
                    
                case 'cardPlayed':
                    addLog(data.playerName + ' 打出了 ' + data.card, 'info');
                    break;
                    
                case 'gameOver':
                    addLog('游戏结束! 获胜者: ' + data.winner, 'success');
                    document.getElementById('gameStatus').textContent = '已结束';
                    break;
                    
                case 'error':
                    addLog('错误: ' + data.message, 'error');
                    break;
                    
                default:
                    addLog('未知消息类型: ' + data.type, 'warning');
            }
        }

        // 渲染手牌
        function renderHand() {
            const container = document.getElementById('myHand');
            container.innerHTML = '';
            
            myHand.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.dataset.index = index;
                
                // 判断花色和颜色
                const suit = card.suit || '';
                const value = card.value || '';
                
                if (suit === 'joker') {
                    cardEl.classList.add('card-joker');
                    cardEl.innerHTML = `<div class="card-value">${value}</div>`;
                } else {
                    const isRed = suit === '♥' || suit === '♦';
                    cardEl.classList.add(isRed ? 'red' : 'black');
                    cardEl.innerHTML = `
                        <div class="card-value">${value}</div>
                        <div class="card-suit">${suit}</div>
                    `;
                }
                
                cardEl.onclick = () => selectCard(index);
                container.appendChild(cardEl);
            });
        }

        // 选择卡牌
        function selectCard(index) {
            // 移除之前的选择
            document.querySelectorAll('.card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // 选择新卡牌
            selectedCardIndex = index;
            const cardEl = document.querySelector(`[data-index="${index}"]`);
            if (cardEl) {
                cardEl.classList.add('selected');
            }
            
            document.getElementById('playCardBtn').disabled = false;
        }

        // 登录
        function login() {
            const username = document.getElementById('usernameInput').value;
            if (!username) {
                addLog('请输入用户名', 'warning');
                return;
            }
            
            ws.send(JSON.stringify({
                action: 'login',
                username: username
            }));
            
            closeModal('loginModal');
        }

        // 创建游戏
        function createGame() {
            ws.send(JSON.stringify({
                action: 'createGame'
            }));
        }

        // 加入游戏
        function joinGame() {
            const gameId = document.getElementById('gameIdInput').value;
            if (!gameId) {
                addLog('请输入游戏ID', 'warning');
                return;
            }
            
            ws.send(JSON.stringify({
                action: 'joinGame',
                gameId: gameId
            }));
            
            closeModal('joinModal');
        }

        // 开始游戏
        function startGame() {
            if (!currentGameId) {
                addLog('请先创建或加入游戏', 'warning');
                return;
            }
            
            ws.send(JSON.stringify({
                action: 'startGame',
                gameId: currentGameId
            }));
        }

        // 出牌
        function playSelectedCard() {
            if (selectedCardIndex === null) {
                addLog('请先选择要出的牌', 'warning');
                return;
            }
            
            if (!currentGameId) {
                addLog('请先加入游戏', 'warning');
                return;
            }
            
            ws.send(JSON.stringify({
                action: 'playCard',
                gameId: currentGameId,
                cardIndex: selectedCardIndex
            }));
            
            selectedCardIndex = null;
            document.getElementById('playCardBtn').disabled = true;
        }

        // 结束回合
        function endTurn() {
            if (!currentGameId) {
                addLog('请先加入游戏', 'warning');
                return;
            }
            
            ws.send(JSON.stringify({
                action: 'endTurn',
                gameId: currentGameId
            }));
        }

        // 更新状态栏
        function updateStatus(status, message) {
            const statusBar = document.getElementById('statusBar');
            statusBar.innerHTML = `<span class="status-${status}">${message}</span>`;
        }

        // 添加日志
        function addLog(message, type = 'info') {
            const logArea = document.getElementById('logArea');
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry log-${type}`;
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logArea.appendChild(logEntry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        // 显示模态框
        function showLoginModal() {
            document.getElementById('loginModal').style.display = 'flex';
        }

        function showJoinModal() {
            document.getElementById('joinModal').style.display = 'flex';
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            addLog('系统: 页面加载完成', 'info');
            addLog('提示: 请先连接服务器，然后登录', 'info');
        });
    </script>
</body>
</html>
